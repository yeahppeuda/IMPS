<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event | IPManagementSystem</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <div class="page-layout min-h-screen">
    <div class="grid gap-6 xl:grid-cols-[280px_1fr]">
      <aside id="sidebarTarget" class="rounded-[2rem] bg-white p-6 shadow-soft card-border"></aside>
      <main class="space-y-6">
        <div id="headerTarget"></div>
        <section class="rounded-[2rem] bg-white p-8 shadow-soft card-border">
          <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
            <div>
              <p class="text-xs uppercase tracking-[0.28em] text-slate-500">Event</p>
              <h1 class="mt-2 text-3xl font-semibold text-slate-950">IP Events & Deadlines</h1>
            </div>
            <button onclick="openSharedModal()" class="inline-flex items-center justify-center rounded-2xl bg-brand-accent px-5 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-violet-600">Add Event</button>
          </div>
          <div class="mt-8 grid gap-4 md:grid-cols-2">
            <article class="rounded-3xl bg-slate-50 p-6">
              <p class="text-sm text-slate-600">Track review dates, renewal notices, and government deadlines in a unified view.</p>
            </article>
            <article class="rounded-3xl bg-slate-50 p-6">
              <p class="text-sm text-slate-600">This layout is ready for calendar and notification features.</p>
            </article>
          </div>
        </section>
      </main>
    </div>
    <div id="modalTarget"></div>
  </div>
  <script src="../assets/js/app.js"></script>
</body>
</html>
