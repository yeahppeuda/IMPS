    // SPA Router
    class Router {
      constructor() {
        this.currentRoute = null;
        this.contentEl = document.getElementById('page-content');
        this.navLinks = document.querySelectorAll('[data-route]');
        
        this.init();
      }
      
      init() {
        // Handle navigation clicks
        this.navLinks.forEach(link => {
          link.addEventListener('click', (e) => {
            e.preventDefault();
            const route = link.getAttribute('data-route');
            this.navigate(route);
          });
        });
        
        // Handle browser back/forward
        window.addEventListener('popstate', () => {
          const route = this.getRouteFromHash();
          this.loadPage(route, false);
        });
        
        // Load initial route
        const initialRoute = this.getRouteFromHash() || 'dashboard';
        this.loadPage(initialRoute, false);
      }
      
      getRouteFromHash() {
        const hash = window.location.hash;
        if (hash && hash.startsWith('#/')) {
          return hash.substring(2);
        }
        return null;
      }
      
      navigate(route) {
        if (route === this.currentRoute) return;
        
        window.history.pushState({ route }, '', `#/${route}`);
        this.loadPage(route, true);
      }
      
      async loadPage(route, animate = true) {
        const template = pageTemplates[route] || pageTemplates.dashboard;
        
        // Update active nav link
        this.updateActiveNav(route);
        
        // Update document title
        this.updateTitle(route);
        
        if (animate) {
          // Fade out current content
          this.contentEl.classList.add('fade-out');
          
          await new Promise(resolve => setTimeout(resolve, 150));
          
          // Update content
          this.contentEl.innerHTML = template;
          
          // Prepare for fade in
          this.contentEl.classList.remove('fade-out');
          this.contentEl.classList.add('fade-in');
          
          // Trigger reflow
          void this.contentEl.offsetWidth;
          
          // Fade in new content
          this.contentEl.classList.remove('fade-in');
        } else {
          this.contentEl.innerHTML = template;
        }
        
        this.currentRoute = route;
        
        // Scroll to top smoothly
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
      
      updateActiveNav(route) {
        this.navLinks.forEach(link => {
          const linkRoute = link.getAttribute('data-route');
          if (linkRoute === route) {
            link.classList.add('sidebar-active', 'bg-primary-fixed', 'text-primary', 'font-bold');
          } else {
            link.classList.remove('sidebar-active', 'bg-primary-fixed', 'text-primary', 'font-bold');
          }
        });
      }
      
      updateTitle(route) {
        const titles = {
          dashboard: 'Dashboard - IP Management System',
          copyright: 'Copyright Registry - IP Management System',
          patent: 'Patent Filings - IP Management System',
          trademark: 'Trademark Portfolio - IP Management System',
          'utility-model': 'Utility Model - IP Management System',
          'industrial-design': 'Industrial Design - IP Management System',
          event: 'Events & Deadlines - IP Management System'
        };
        document.title = titles[route] || 'IP Management System';
      }
    }
    
    // Modal functions (for dashboard)
    function openDashboardResearchModal() {
      // Modal functionality can be added here
      alert('Add Research modal would open here');
    }
    
    // Initialize router when DOM is ready
    document.addEventListener('DOMContentLoaded', () => {
      new Router();
    });
  </script>
